<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
* { font-family: 'Tajawal', sans-serif; }
html, body { height: 100%; margin: 0; }

@keyframes popIn {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(88, 204, 2, 0.4); }
  50% { box-shadow: 0 0 0 12px rgba(88, 204, 2, 0); }
}
@keyframes confetti-fall {
  0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
  100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
}
@keyframes heart-beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
@keyframes streak-glow {
  0%, 100% { text-shadow: 0 0 5px rgba(255,165,0,0.5); }
  50% { text-shadow: 0 0 20px rgba(255,165,0,0.8); }
}
.pop-in { animation: popIn 0.4s ease-out; }
.slide-up { animation: slideUp 0.5s ease-out; }
.shake { animation: shake 0.5s ease; }
.pulse-glow { animation: pulse-glow 1.5s infinite; }
.heart-beat { animation: heart-beat 0.3s ease; }
.streak-glow { animation: streak-glow 1.5s infinite; }

.option-btn {
  transition: all 0.2s ease;
  border: 3px solid #e5e7eb;
  position: relative;
  overflow: hidden;
}
.option-btn:hover:not(.disabled) {
  border-color: #a78bfa;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(167, 139, 250, 0.3);
}
.option-btn:active:not(.disabled) { transform: translateY(0); }
.option-btn.correct {
  border-color: #58cc02 !important;
  background: linear-gradient(135deg, #d7ffb8, #e8ffe0) !important;
  color: #1a5c00 !important;
}
.option-btn.wrong {
  border-color: #ff4b4b !important;
  background: linear-gradient(135deg, #ffd7d7, #ffe8e8) !important;
  color: #8b0000 !important;
}
.option-btn.disabled { pointer-events: none; opacity: 0.7; }

.progress-fill {
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, #58cc02, #7ee83c);
}

.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -20px;
  animation: confetti-fall 2.5s linear forwards;
  z-index: 100;
  border-radius: 2px;
}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-50 overflow-auto">
  <div id="app" class="w-full h-full flex flex-col items-center" style="background: linear-gradient(180deg, #f0f4ff 0%, #faf5ff 50%, #fff5f5 100%);">
   <!-- Start Screen -->
   <div id="start-screen" class="w-full h-full flex flex-col items-center justify-center p-6">
    <div class="pop-in text-center max-w-md">
     <div class="text-8xl mb-6">
      🏛️
     </div>
     <h1 id="main-title" class="text-4xl font-900 text-gray-800 mb-3">تحدي التاريخ</h1>
     <p class="text-lg text-gray-500 mb-2">الثنائية القطبية والثورة الجزائرية</p>
     <div class="flex items-center justify-center gap-3 mb-8 text-gray-400 text-sm">
      <span>📝 29 سؤال</span> <span>•</span> <span>❤️ 3 حياة</span> <span>•</span> <span>🔥 سلسلة انتصارات</span>
     </div><button id="start-btn" onclick="startQuiz()" class="w-full py-4 rounded-2xl text-xl font-700 text-white shadow-lg hover:shadow-xl transition-all active:scale-95" style="background: linear-gradient(135deg, #7c3aed, #a78bfa); border-bottom: 4px solid #5b21b6;"> ابدأ التحدي 🚀 </button>
    </div>
   </div><!-- Quiz Screen -->
   <div id="quiz-screen" class="w-full h-full flex-col hidden" style="max-width: 600px;">
    <!-- Top Bar -->
    <div class="flex items-center gap-3 p-4">
     <button onclick="showQuit()" class="text-gray-400 hover:text-gray-600 transition-colors"> <i data-lucide="x" style="width:28px;height:28px;"></i> </button>
     <div class="flex-1 h-4 bg-gray-200 rounded-full overflow-hidden">
      <div id="progress-bar" class="progress-fill h-full rounded-full" style="width:0%"></div>
     </div>
     <div id="lives-display" class="flex items-center gap-1">
      <span class="text-xl">❤️</span> <span id="lives-count" class="font-700 text-red-500 text-lg">3</span>
     </div>
    </div><!-- Streak -->
    <div id="streak-bar" class="text-center py-1 hidden">
     <span id="streak-text" class="text-orange-500 font-700 streak-glow">🔥 سلسلة: 0</span>
    </div><!-- Question Area -->
    <div class="flex-1 px-5 pb-5 flex flex-col">
     <div id="question-counter" class="text-sm text-gray-400 font-500 mb-2 mt-2"></div>
     <div id="question-card" class="bg-white rounded-3xl p-6 shadow-sm mb-5 slide-up">
      <p id="question-text" class="text-xl font-700 text-gray-800 leading-relaxed"></p>
     </div>
     <div id="options-container" class="flex flex-col gap-3 flex-1"></div><!-- Feedback -->
     <div id="feedback-area" class="hidden mt-4">
      <div id="feedback-box" class="rounded-2xl p-4 flex items-center gap-3">
       <span id="feedback-icon" class="text-3xl"></span>
       <div>
        <p id="feedback-title" class="font-700 text-lg"></p>
        <p id="feedback-detail" class="text-sm opacity-80"></p>
       </div>
      </div><button id="next-btn" onclick="nextQuestion()" class="w-full mt-3 py-4 rounded-2xl text-lg font-700 text-white transition-all active:scale-95" style="background:linear-gradient(135deg,#7c3aed,#a78bfa);border-bottom:4px solid #5b21b6;"> متابعة </button>
     </div>
    </div>
   </div><!-- Result Screen -->
   <div id="result-screen" class="w-full h-full flex-col items-center justify-center p-6 hidden">
    <div class="pop-in text-center max-w-md w-full">
     <div id="result-emoji" class="text-8xl mb-4"></div>
     <h2 id="result-title" class="text-3xl font-900 text-gray-800 mb-2"></h2>
     <p id="result-subtitle" class="text-gray-500 mb-6"></p>
     <div class="bg-white rounded-3xl p-6 shadow-sm mb-6 space-y-4">
      <div class="flex justify-between items-center">
       <span class="text-gray-500">الإجابات الصحيحة</span> <span id="stat-correct" class="text-2xl font-700 text-green-500"></span>
      </div>
      <div class="flex justify-between items-center">
       <span class="text-gray-500">الإجابات الخاطئة</span> <span id="stat-wrong" class="text-2xl font-700 text-red-400"></span>
      </div>
      <div class="flex justify-between items-center">
       <span class="text-gray-500">أفضل سلسلة</span> <span id="stat-streak" class="text-2xl font-700 text-orange-500"></span>
      </div>
      <div class="flex justify-between items-center">
       <span class="text-gray-500">النتيجة</span> <span id="stat-score" class="text-2xl font-700 text-purple-600"></span>
      </div>
     </div><button onclick="restartQuiz()" class="w-full py-4 rounded-2xl text-xl font-700 text-white shadow-lg transition-all active:scale-95 mb-3" style="background:linear-gradient(135deg,#7c3aed,#a78bfa);border-bottom:4px solid #5b21b6;"> أعد المحاولة 🔄 </button> <button onclick="reviewWrong()" id="review-btn" class="w-full py-4 rounded-2xl text-xl font-700 text-purple-600 bg-purple-50 border-2 border-purple-200 transition-all active:scale-95 hidden"> مراجعة الأخطاء 📖 </button>
    </div>
   </div><!-- Quit Confirm -->
   <div id="quit-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-6 hidden" style="z-index:50;">
    <div class="bg-white rounded-3xl p-6 max-w-sm w-full text-center pop-in">
     <div class="text-5xl mb-3">
      😢
     </div>
     <h3 class="text-xl font-700 text-gray-800 mb-2">هل تريد الخروج؟</h3>
     <p class="text-gray-500 mb-5">سيتم فقدان تقدمك الحالي</p>
     <div class="flex gap-3">
      <button onclick="hideQuit()" class="flex-1 py-3 rounded-xl font-700 text-gray-600 bg-gray-100 transition-all active:scale-95">البقاء</button> <button onclick="quitQuiz()" class="flex-1 py-3 rounded-xl font-700 text-white transition-all active:scale-95" style="background:#ff4b4b;">خروج</button>
     </div>
    </div>
   </div>
  </div>
  <script>
const questions = [
  {q:"متى تأسس حلف الشمال الأطلسي (NATO)؟",opts:["04 أفريل 1949","14 ماي 1955","24 أكتوبر 1945"],ans:0},
  {q:"من هو الزعيم السوفياتي الذي طرح سياسة \"التعايش السلمي\"؟",opts:["نيكيتا خروتشوف","جوزيف ستالين","ميخائيل غورباتشوف"],ans:0},
  {q:"ما هو التاريخ الدقيق لاندلاع الثورة التحريرية الجزائرية؟",opts:["01 نوفمبر 1954","08 ماي 1945","20 أوت 1955"],ans:0},
  {q:"ما الهدف من \"مشروع مارشال\" الاقتصادي؟",opts:["إعادة إعمار أوروبا وربطها بالرأسمالية","دعم الحركات التحررية في إفريقيا","نشر الفكر الشيوعي في أمريكا اللاتينية"],ans:0},
  {q:"أين وقعت أخطر أزمات الحرب الباردة عام 1962 (أزمة الصواريخ)؟",opts:["كوبا","برلين","السويس"],ans:0},
  {q:"من هو أول رئيس للحكومة المؤقتة للجمهورية الجزائرية (1958)؟",opts:["فرحات عباس","بن يوسف بن خدة","أحمد بن بلة"],ans:0},
  {q:"ما هو تاريخ تأسيس \"حلف وارسو\"؟",opts:["14 ماي 1955","24 فيفري 1955","04 أفريل 1949"],ans:0},
  {q:"ما هي المنظمة التي تأسست في جانفي 1949 لتدعيم التعاون الاقتصادي بين دول المعسكر الشرقي؟",opts:["الكوميكون","الكومنفورم","حلف وارسو"],ans:0},
  {q:"متى تم تأميم قناة السويس من طرف جمال عبد الناصر؟",opts:["26 جويلية 1956","24 أكتوبر 1956","14 ماي 1948"],ans:0},
  {q:"من هو صاحب سياسة \"ملء الفراغ\"؟",opts:["دوايت إيزنهاور","هاري ترومان","وودرو ويلسون"],ans:0},
  {q:"ما هو التاريخ الذي يمثل هجمات الشمال القسنطيني؟",opts:["20 أوت 1955","20 أوت 1956","11 ديسمبر 1960"],ans:0},
  {q:"أين انعقد مؤتمر الصومام لتنظيم الثورة الجزائرية؟",opts:["إيفري - بجاية","جبال الأوراس","قلعة بني عباس"],ans:0},
  {q:"ما هي \"القوة الثالثة\" التي حاول ديغول إنشاؤها في الجزائر؟",opts:["طبقة من العملاء الجزائريين الموالين لفرنسا","جيش من المتطوعين العرب","منظمة دولية لمراقبة الاستفتاء"],ans:0},
  {q:"متى تم التوقيع على اتفاقيات إيفيان الثانية؟",opts:["18 مارس 1962","19 مارس 1962","05 جويلية 1962"],ans:0},

  {q:"ما هو المصطلح الذي يصف حالة التوتر بين القوتين العظميين دون مواجهة عسكرية مباشرة؟",opts:["الحرب الباردة","التعايش السلمي","الانفراج الدولي"],ans:0},

  {q:"ما هو تاريخ بناء جدار برلين؟",opts:["13 أوت 1961","09 نوفمبر 1989","04 أفريل 1949"],ans:0},

  {q:"ما هو التاريخ الذي يمثل سقوط جدار برلين؟",opts:["09 نوفمبر 1989","03 أكتوبر 1990","25 ديسمبر 1991"],ans:0},
  {q:"من هو القائد الذي قاد الثورة الفيتنامية ضد فرنسا والولايات المتحدة؟",opts:["هوشي منه","ماو تسي تونغ","كيم إيل سونغ"],ans:0},
  {q:"ما هو \"مبدأ ترومان\"؟",opts:["سياسة أمريكية لتقديم الدعم المالي والعسكري لتركيا واليونان","مشروع لإعادة إعمار اليابان","خطة لتقسيم ألمانيا"],ans:0},
  {q:"متى انعقد مؤتمر مالطا الذي أعلن فيه نهاية الحرب الباردة؟",opts:["ديسمبر 1989","فيفري 1945","نوفمبر 1990"],ans:0},
  {q:"ما هي المجموعة التي فجرت الثورة الجزائرية؟",opts:["مجموعة الـ 22","المنظمة الخاصة (OS)","حركة انتصار الحريات الديمقراطية"],ans:0},
  {q:"من هو قائد المنطقة الأولى (الأوراس) عند اندلاع الثورة؟",opts:["مصطفى بن بولعيد","ديدوش مراد","رابح بيطاط"],ans:0},
  {q:"ما هو تاريخ تأسيس اللجنة الثورية للوحدة والعمل (CRUA)؟",opts:["23 مارس 1954","17 جوان 1954","10 أكتوبر 1954"],ans:0},

  {q:"من هو صاحب كتاب \"فلسفة الثورة\"؟",opts:["جمال عبد الناصر","جواهر لال نهرو","هواري بومدين"],ans:0},

  {q:"من هو صاحب فكرة \"ستار حديدي\" وصفاً للانقسام الأوروبي؟",opts:["وينستون تشرشل","فرانكلين روزفلت","هاري ترومان"],ans:0},
  {q:"أين يقع مقر هيئة الأمم المتحدة؟",opts:["نيويورك","جنيف","واشنطن"],ans:0},
  {q:"ما هو تاريخ تأسيس منظمة الكوميكون؟",opts:["25 جانفي 1949","4 أفريل 1949","14 ماي 1955"],ans:0},
  {q:"أي من هذه الدول كانت عضواً في حلف وارسو؟",opts:["بولندا","فرنسا","بلجيكا"],ans:0},

// Shuffle options for each question, keeping track of correct answer
function shuffleQuestions() {
  return questions.map(q => {
    const correctText = q.opts[q.ans];
    const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
    return { q: q.q, opts: shuffled, ans: shuffled.indexOf(correctText) };
  }).sort(() => Math.random() - 0.5);
}

let currentQuestions, currentIndex, lives, score, streak, bestStreak, correctCount, wrongAnswers, answered;

const defaultConfig = {
  app_title: "تحدي التاريخ",
  background_color: "#f0f4ff",
  surface_color: "#ffffff",
  text_color: "#1f2937",
  primary_color: "#7c3aed",
  accent_color: "#58cc02"
};

function applyConfig(config) {
  const t = config.app_title || defaultConfig.app_title;
  const bg = config.background_color || defaultConfig.background_color;
  const sf = config.surface_color || defaultConfig.surface_color;
  const tx = config.text_color || defaultConfig.text_color;
  const pr = config.primary_color || defaultConfig.primary_color;

  document.getElementById('main-title').textContent = t;
  document.getElementById('app').style.background = `linear-gradient(180deg, ${bg} 0%, #faf5ff 50%, #fff5f5 100%)`;

  document.querySelectorAll('.bg-white').forEach(el => el.style.backgroundColor = sf);
  document.querySelectorAll('[style*="background: linear-gradient(135deg,"]').forEach(el => {
    if(el.classList.contains('option-btn')) return;
  });

  const purpleBtns = document.querySelectorAll('button');
  purpleBtns.forEach(btn => {
    if(btn.style.background && btn.style.background.includes('7c3aed')) {
      btn.style.background = `linear-gradient(135deg, ${pr}, ${pr}cc)`;
      btn.style.borderBottomColor = pr;
    }
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({primary_color:v}); }},
      { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({accent_color:v}); }}
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || 'Tajawal',
      set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }
    },
    fontSizeable: {
      get: () => config.font_size || 16,
      set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ["app_title", config.app_title || defaultConfig.app_title]
  ])
});

function startQuiz() {
  currentQuestions = shuffleQuestions();
  currentIndex = 0; lives = 3; score = 0; streak = 0; bestStreak = 0; correctCount = 0; wrongAnswers = []; answered = false;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('result-screen').style.display = '';
  const qs = document.getElementById('quiz-screen');
  qs.classList.remove('hidden');
  qs.style.display = 'flex';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  const pct = ((currentIndex) / currentQuestions.length * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('lives-count').textContent = lives;
  document.getElementById('question-counter').textContent = `السؤال ${currentIndex+1} من ${currentQuestions.length}`;
  document.getElementById('question-text').textContent = q.q;

  if(streak >= 2) {
    document.getElementById('streak-bar').classList.remove('hidden');
    document.getElementById('streak-text').textContent = `🔥 سلسلة: ${streak}`;
  } else {
    document.getElementById('streak-bar').classList.add('hidden');
  }

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  document.getElementById('feedback-area').classList.add('hidden');

  const labels = ['أ','ب','ج','د'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn bg-white rounded-2xl p-4 text-right flex items-center gap-3 slide-up';
    btn.style.animationDelay = (i * 0.08) + 's';
    btn.innerHTML = `<span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-700 text-gray-500 shrink-0">${labels[i]}</span><span class="text-lg font-500 text-gray-700">${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if(answered) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach(b => b.classList.add('disabled'));
  btns[q.ans].classList.add('correct');

  const fb = document.getElementById('feedback-area');
  const box = document.getElementById('feedback-box');
  const icon = document.getElementById('feedback-icon');
  const title = document.getElementById('feedback-title');
  const detail = document.getElementById('feedback-detail');

  if(idx === q.ans) {
    streak++; correctCount++; score += 10 + (streak > 1 ? streak * 2 : 0);
    if(streak > bestStreak) bestStreak = streak;
    icon.textContent = '✅';
    title.textContent = 'ممتاز!';
    const msgs = ['أحسنت! 🎉','رائع! 💪','إجابة صحيحة! ⭐','عبقري! 🧠'];
    detail.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    box.style.background = 'linear-gradient(135deg, #d7ffb8, #e8ffe0)';
    box.style.color = '#1a5c00';
    if(streak >= 3) spawnConfetti(5);
  } else {
    btns[idx].classList.add('wrong');
    btns[idx].classList.add('shake');
    streak = 0; lives--;
    wrongAnswers.push({q: q.q, correct: q.opts[q.ans], chosen: q.opts[idx]});
    icon.textContent = '❌';
    title.textContent = 'للأسف!';
    detail.textContent = `الإجابة الصحيحة: ${q.opts[q.ans]}`;
    box.style.background = 'linear-gradient(135deg, #ffd7d7, #ffe8e8)';
    box.style.color = '#8b0000';
    document.getElementById('lives-count').textContent = lives;
    const ld = document.getElementById('lives-display');
    ld.classList.add('heart-beat');
    setTimeout(() => ld.classList.remove('heart-beat'), 300);
  }

  fb.classList.remove('hidden');
  fb.classList.add('slide-up');
}

function nextQuestion() {
  if(lives <= 0) return showResults();
  currentIndex++;
  if(currentIndex >= currentQuestions.length) return showResults();
  showQuestion();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.remove('hidden');
  rs.style.display = 'flex';

  const pct = Math.round(correctCount / currentQuestions.length * 100);

  let emoji, title, sub;
  if(pct >= 90) { emoji='🏆'; title='أداء استثنائي!'; sub='أنت خبير في التاريخ!'; spawnConfetti(20); }
  else if(pct >= 70) { emoji='🌟'; title='أداء رائع!'; sub='معلوماتك ممتازة!'; spawnConfetti(10); }
  else if(pct >= 50) { emoji='💪'; title='جيد!'; sub='واصل التعلم!'; }
  else if(lives <= 0) { emoji='💔'; title='انتهت الحياة!'; sub='حاول مرة أخرى!'; }
  else { emoji='📚'; title='تحتاج مراجعة'; sub='لا تستسلم!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = sub;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongAnswers.length;
  document.getElementById('stat-streak').textContent = '🔥 ' + bestStreak;
  document.getElementById('stat-score').textContent = score;
  document.getElementById('progress-bar').style.width = '100%';

  document.getElementById('review-btn').classList.toggle('hidden', wrongAnswers.length === 0);
}

function restartQuiz() { startQuiz(); }

function reviewWrong() {
  currentQuestions = wrongAnswers.map(w => {
    const orig = questions.find(q => q.q === w.q);
    if(!orig) return null;
    const correctText = orig.opts[orig.ans];
    const shuffled = [...orig.opts].sort(() => Math.random() - 0.5);
    return { q: orig.q, opts: shuffled, ans: shuffled.indexOf(correctText) };
  }).filter(Boolean);
  currentIndex = 0; lives = 3; score = 0; streak = 0; bestStreak = 0; correctCount = 0; wrongAnswers = []; answered = false;
  document.getElementById('result-screen').style.display = 'none';
  const qs = document.getElementById('quiz-screen');
  qs.classList.remove('hidden');
  qs.style.display = 'flex';
  showQuestion();
}

function showQuit() { document.getElementById('quit-overlay').classList.remove('hidden'); }
function hideQuit() { document.getElementById('quit-overlay').classList.add('hidden'); }
function quitQuiz() {
  hideQuit();
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('start-screen').classList.remove('hidden');
}

function spawnConfetti(count) {
  const colors = ['#ff4b4b','#58cc02','#7c3aed','#ffc800','#1cb0f6','#ff9600'];
  for(let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay = Math.random()*0.8 + 's';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = (6 + Math.random()*8) + 'px';
    el.style.height = (6 + Math.random()*8) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}
