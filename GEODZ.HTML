<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { kufi: ['Noto Kufi Arabic', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Kufi Arabic', sans-serif; }
    .quiz-btn { transition: all 0.25s ease; }
    .quiz-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .correct-answer { animation: correctPulse 0.5s ease; }
    .wrong-answer { animation: shake 0.4s ease; }
    @keyframes correctPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .progress-fill { transition: width 0.5s ease; }
    .group-card { transition: all 0.3s ease; }
    .group-card:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .star { animation: starPop 0.3s ease forwards; }
    @keyframes starPop {
      0% { transform: scale(0) rotate(0deg); opacity:0; }
      60% { transform: scale(1.3) rotate(15deg); opacity:1; }
      100% { transform: scale(1) rotate(0deg); opacity:1; }
    }
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      animation: confettiFall 2s ease forwards;
      z-index: 100;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity:1; }
      100% { transform: translateY(100%) rotate(720deg); opacity:0; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto bg-white">
   <!-- Home Screen -->
   <div id="homeScreen" class="min-h-full flex flex-col items-center justify-center p-4" style="background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1a 100%);">
    <div class="text-center fade-up max-w-lg w-full">
     <div class="mb-6">
      <div class="w-24 h-24 mx-auto rounded-2xl flex items-center justify-center text-5xl" style="background: #FFD700;">
       🌍
      </div>
     </div>
     <h1 id="mainTitle" class="text-3xl md:text-4xl font-extrabold text-white mb-3">جغرافيا الجزائر - بكالوريا</h1>
     <p class="text-white/80 text-lg mb-8">اختبر معلوماتك في الجغرافيا واستعد للبكالوريا!</p>
     <div id="homeStats" class="flex justify-center gap-4 mb-8">
      <div class="rounded-xl px-5 py-3 text-center" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);">
       <div class="text-2xl font-bold text-yellow-300" id="totalScore">
        0
       </div>
       <div class="text-white/70 text-sm">
        النقاط
       </div>
      </div>
      <div class="rounded-xl px-5 py-3 text-center" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);">
       <div class="text-2xl font-bold text-yellow-300" id="completedGroups">
        0/3
       </div>
       <div class="text-white/70 text-sm">
        المجموعات
       </div>
      </div>
     </div><button onclick="showGroups()" class="quiz-btn px-10 py-4 rounded-2xl text-xl font-bold text-[#0d4f6b] shadow-lg" style="background: #FFD700;"> ابدأ المراجعة ✨ </button>
    </div>
   </div><!-- Groups Screen -->
   <div id="groupsScreen" class="min-h-full p-4 hidden">
    <div class="max-w-2xl mx-auto pt-6">
     <button onclick="showHome()" class="flex items-center gap-2 text-white/80 hover:text-white mb-6 transition"> <i data-lucide="arrow-right" style="width:20px;height:20px;"></i> <span>الرئيسية</span> </button>
     <h2 class="text-2xl font-bold text-white mb-2">المجموعات</h2>
     <p class="text-white/70 mb-6">أكمل كل مجموعة لفتح التالية</p>
     <div id="groupCards" class="space-y-4"></div>
    </div>
   </div><!-- Quiz Screen -->
   <div id="quizScreen" class="min-h-full p-4 hidden">
    <div class="max-w-2xl mx-auto pt-6">
     <div class="flex items-center justify-between mb-4">
      <button onclick="showGroups()" class="flex items-center gap-2 text-white/80 hover:text-white transition"> <i data-lucide="arrow-right" style="width:20px;height:20px;"></i> <span>المجموعات</span> </button>
      <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background: rgba(255,255,255,0.15);">
       <span class="text-yellow-300 font-bold" id="quizScore">0</span> <span class="text-white/70">/</span> <span class="text-white/70" id="quizTotal">10</span>
      </div>
     </div><!-- Progress Bar -->
     <div class="w-full h-3 rounded-full mb-6" style="background: rgba(255,255,255,0.2);">
      <div id="progressBar" class="h-full rounded-full progress-fill" style="background: #FFD700; width: 0%;"></div>
     </div>
     <div class="text-white/60 text-sm mb-2" id="questionCounter">
      السؤال 1 من 10
     </div>
     <div id="questionCard" class="rounded-2xl p-6 shadow-xl fade-up" style="background: rgba(255,255,255,0.95);">
      <h3 id="questionText" class="text-lg font-bold mb-5" style="color: #0d4f6b;"></h3>
      <div id="answersContainer" class="space-y-3"></div>
     </div>
     <div id="feedbackArea" class="mt-4 text-center hidden">
      <button id="nextBtn" onclick="nextQuestion()" class="quiz-btn px-8 py-3 rounded-xl font-bold text-[#0d4f6b] shadow-lg" style="background: #FFD700;"> السؤال التالي <span style="margin-right:4px;">←</span> </button>
     </div>
    </div>
   </div><!-- Results Screen -->
   <div id="resultsScreen" class="min-h-full flex flex-col items-center justify-center p-4 hidden">
    <div class="max-w-lg w-full text-center fade-up">
     <div id="resultsEmoji" class="text-7xl mb-4">
      🎉
     </div>
     <h2 class="text-3xl font-extrabold text-white mb-2" id="resultsTitle">أحسنت!</h2>
     <p class="text-white/80 text-lg mb-6" id="resultsDesc"></p>
     <div class="rounded-2xl p-6 mb-6" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);">
      <div class="text-5xl font-extrabold text-yellow-300 mb-1" id="resultScore">
       0/10
      </div>
      <div class="text-white/70">
       إجابة صحيحة
      </div>
      <div id="starsContainer" class="flex justify-center gap-2 mt-4"></div>
     </div>
     <div class="flex flex-col gap-3">
      <button onclick="retryGroup()" class="quiz-btn px-8 py-3 rounded-xl font-bold text-[#0d4f6b]" style="background: #FFD700;">إعادة المحاولة 🔄</button> <button onclick="showGroups()" class="quiz-btn px-8 py-3 rounded-xl font-bold text-white border-2 border-white/30 hover:bg-white/10">المجموعات</button>
     </div>
    </div>
   </div>
  </div>
  <script>
  // All questions data
  const allQuestions = [
    {q:"كم تبلغ مساحة الجزائر الإجمالية؟", opts:["2.381.741 كلم²","1.500.000 كلم²","2.100.000 كلم²"], correct:0},
    {q:"ما هي أعلى قمة جبلية في الجزائر؟", opts:["قمة تاهات بآتاكور","قمة لالة خديجة","قمة الشريعة"], correct:0},
    {q:"ما هو طول الشريط الساحلي الجزائري؟", opts:["1000 كلم","1200 كلم","1600 كلم"], correct:1},
    {q:"أي من الأقاليم التالية يغطي 84% من مساحة الجزائر؟", opts:["إقليم التل","إقليم الهضاب العليا","الإقليم الصحراوي"], correct:2},
    {q:'ما هو "عرق إيغيدي"؟', opts:["سهل ساحلي خصيب","كثبان رملية واسعة","هضبة صخرية"], correct:1},
    {q:"بماذا يتميز المناخ المتوسطي في شمال الجزائر؟", opts:["حار جاف صيفاً، دافئ ممطر شتاءً","شديد البرودة طوال العام","أمطار غزيرة صيفاً وشتاءً"], correct:0},
    {q:"ما هو الخط الذي يمر بالقرب من مدينة مستغانم ويعتبر مرجعاً زمنياً؟", opts:["خط الاستواء","خط غرينتش","مدار السرطان"], correct:1},
    {q:'ما هي "الرقوق" في الصحراء؟', opts:["جبال بركانية","سهول مغطاة بالحصى والرمل الخشن","أودية جافة"], correct:1},
    {q:"ما هو المدار الذي يمر بجنوب الجزائر؟", opts:["مدار الجدي","مدار السرطان","خط الاستواء"], correct:1},
    {q:'أين تقع "سلسلة الأطلس التلي"؟', opts:["في أقصى الجنوب","بمحاذاة الشريط الساحلي شمالاً","بين الهضاب والصحراء"], correct:1},
    {q:"ما هو أطول وادي في الجزائر؟", opts:["وادي الصومام","وادي الشلف","وادي سيبوس"], correct:1},
    {q:"بماذا تعرف الجبال في منطقة الهقار؟", opts:["جبال كلسية حديثة","جبال بركانية قديمة","تلال رملية"], correct:1},
    {q:'ما هي "الشطوط"؟', opts:["غابات كثيفة","منخفضات ملحية تمتلئ بالماء شتاءً","جبال شاهقة"], correct:1},
    {q:"أي ريح تهب صيفاً من الجنوب نحو الشمال وتكون حارة؟", opts:["ريح السيروكو (الشهيلي)","الرياح القطبية","الرياح التجارية"], correct:0},
    {q:"ما هو الإقليم الذي يفصل بين الأطلس التلي والأطلس الصحراوي؟", opts:["إقليم الهضاب العليا","العرق الشرقي الكبير","سهل المتيجة"], correct:0},
    {q:"كم تقدر نسبة الأراضي الصالحة للزراعة في الجزائر؟", opts:["حوالي 3%","حوالي 30%","حوالي 50%"], correct:0},
    {q:"ما هي الولاية التي تعتبر بوابة الصحراء؟", opts:["وهران","بسكرة","عنابة"], correct:1},
    {q:'أين تقع جبال "الونشريس"؟', opts:["في الأطلس التلي الغربي","في الهقار","في الساحل الشرقي"], correct:0},
    {q:"ما هو النوع السائد من الغطاء النباتي في الهضاب العليا؟", opts:["غابات الصنوبر","نبات الحلفاء","النخيل"], correct:1},
    {q:'ما هي الولاية التي يقع فيها "جبل بوطالب"؟', opts:["سطيف","تمنراست","تلمسان"], correct:0},
    {q:"تتميز الأمطار في الجزائر بكونها:", opts:["منتظمة طوال العام","متذبذبة وتتناقص كلما اتجهنا جنوباً","تزداد كلما اتجهنا غرباً"], correct:1},
    {q:'ما هي "الحمادة"؟', opts:["مساحات صخرية واسعة في الصحراء","واحات خضراء","بحيرات عذبة"], correct:0},
    {q:"أي من هذه المدن تقع في إقليم المناخ القاري؟", opts:["الجزائر العاصمة","الجلفة","بجاية"], correct:1},
    {q:"ما هي أهمية موقع الجزائر إفريقياً؟", opts:["تعتبر بوابة القارة نحو أوروبا","تقع في أقصى جنوب القارة","ليس لها سواحل"], correct:0},
    {q:"ما هو الاتجاه العام للجبال في الجزائر؟", opts:["من الشمال إلى الجنوب","من الغرب إلى الشرق (بشكل موازٍ للساحل)","دائرية الشكل"], correct:1},
    {q:'متى شهدت الجزائر "انفجاراً ديموغرافياً" حقيقياً؟', opts:["في الثمانينات (بعد تحسن الظروف المعيشية)","أثناء الحرب العالمية الثانية","في العهد الاستعماري"], correct:0},
    {q:"أين تتركز أعلى كثافة سكانية في الجزائر؟", opts:["في الشريط الساحلي","في الهضاب العليا الغربية","في منطقة الهقار والتبستي"], correct:0},
    {q:"ما هو السبب الرئيسي لتمركز السكان في الشمال؟", opts:["اعتدال المناخ ووفرة النشاط الاقتصادي","حب السكان للبحر فقط","وجود الجبال العالية"], correct:0},
    {q:'ماذا يقصد بـ "النزوح الريفي"؟', opts:["انتقال السكان من الريف إلى المدن","هجرة السكان من مدينة إلى أخرى","السفر للعمل في الخارج"], correct:0},
    {q:"ما هي الفئة العمرية الغالبة على المجتمع الجزائري؟", opts:["فئة الشباب","فئة الشيوخ (فوق 65 سنة)","فئة الأطفال الرضع فقط"], correct:0},
    {q:"ما هو العائق الطبيعي الأكبر الذي يمنع الاستقرار السكاني في الجنوب؟", opts:["المناخ الصحراوي القاسي والجفاف","كثرة الغابات","وجود الأودية الدائمة"], correct:0},
    {q:"أي من هذه المدن تعتبر 'مليونية' (تجاوز سكانها المليون)؟", opts:["الجزائر العاصمة","تمنراست","البيض"], correct:0},
    {q:"ما هي الولاية التي تعتبر الأكبر مساحة والأقل كثافة سكانية؟", opts:["تمنراست","تيزي وزو","سطيف"], correct:0},
    {q:"ماذا نتج عن النزوح الريفي المكثف في السبعينات؟", opts:["ظهور الأحياء القصديرية وأزمة السكن","ازدهار الزراعة في الريف","اختفاء المدن الكبرى"], correct:0},
    {q:'ما هي "التنمية البشرية"؟', opts:["تحسين مستوى معيشة الفرد في الصحة والتعليم والدخل","زيادة عدد المصانع فقط","بناء الطرق السريعة"], correct:0},
    {q:"ما هو مؤشر التنمية البشرية (IDH) للجزائر حالياً؟", opts:["متوسط إلى مرتفع","منخفض جداً","الأعلى عالمياً على الإطلاق"], correct:0},
    {q:"ما هي السياسة التي اتبعتها الدولة لتخفيف الضغط عن المدن الساحلية؟", opts:["بناء المدن الجديدة في الهضاب والجنوب","منع الناس من السفر","هدم البيوت القديمة"], correct:0},
    {q:'ما المقصود بـ "التركيب العمري" للسكان؟', opts:["توزيع السكان حسب فئات السن (أطفال، شباب، شيوخ)","حساب طول قامة السكان","معرفة أقدم عائلة في المدينة"], correct:0},
    {q:"ما هو السبب الرئيسي لانخفاض نسبة الوفيات في الجزائر بعد الاستقلال؟", opts:["تحسن الرعاية الصحية وحملات التلقيح","ممارسة الرياضة الصباحية","زيادة استيراد السيارات"], correct:0},
    {q:'ماذا يمثل "الهرم السكاني" ذو القاعدة العريضة؟', opts:["مجتمع فتي (زيادة نسبة الأطفال والشباب)","مجتمع هرم (زيادة نسبة الشيوخ)","مجتمع متناقص العدد"], correct:0},
    {q:"أي ولاية تقع في إقليم 'الهضاب العليا الشرقية' وتتميز بكثافة سكانية عالية؟", opts:["سطيف","أدرار","مستغانم"], correct:0},
    {q:'ما هي "التهيئة الإقليمية"؟', opts:["تنظيم توزيع السكان والمنشآت بشكل عادل على المساحة","تزيين واجهات المحلات","زراعة الأشجار في الشوارع"], correct:0},
    {q:"ما هو النشاط الاقتصادي الذي ساهم في نشوء مدن في قلب الصحراء؟", opts:["استخراج المحروقات (البترول والغاز)","صيد الأسماك","صناعة السفن"], correct:0},
    {q:'ماذا يقصد بـ "الكثافة السكانية الحسابية"؟', opts:["عدد السكان مقسوماً على المساحة الكلية","عدد المواليد في السنة","مساحة الغابات لكل فرد"], correct:0},
    {q:"أي من هذه الولايات تعتبر 'جاذبة' للسكان؟", opts:["وهران","النعامة","إليزي"], correct:0},
    {q:"ما هو العامل التاريخي الذي أثر في توزيع السكان في الجزائر؟", opts:["الاستعمار الفرنسي وتركز النشاط في الشمال","الفتوحات الإسلامية فقط","الحرب العالمية الأولى"], correct:0},
    {q:"ما هو سن التقاعد القانوني (الغالب) في الجزائر؟", opts:["60 سنة","40 سنة","80 سنة"], correct:0},
    {q:'ماذا يعني مصطلح "الأمية"؟', opts:["عدم القدرة على القراءة والكتابة","عدم الرغبة في العمل","السكن في الأرياف بعيداً عن المدرسة"], correct:0},
    {q:'ما هو دور "المخطط الوطني للتهيئة العمرانية"؟', opts:["الحد من التوسع العشوائي للمدن على حساب الأراضي الزراعية","بناء ناطحات سحاب في كل قرية","تحويل الصحراء إلى بحر"], correct:0},
    {q:'ما هي المدينة التي تسمى "عاصمة الغرب الجزائري"؟', opts:["وهران","تلمسان","سيدي بلعباس"], correct:0},
    {q:"ما هي المادة الأولية التي تمثل عماد الاقتصاد الجزائري؟", opts:["المحروقات (بترول وغاز)","الحديد والصلب","المنتجات الزراعية"], correct:0},
    {q:"أين يقع أكبر حقل لإنتاج البترول في الجزائر؟", opts:["حاسي مسعود","حاسي الرمل","عين صالح"], correct:0},
    {q:"أين يقع أكبر حقل لإنتاج الغاز الطبيعي في الجزائر؟", opts:["حاسي الرمل","الرويبة","أرزيو"], correct:0},
    {q:"ما هو الميناء الرئيسي لتصدير المحروقات في الغرب الجزائري؟", opts:["ميناء أرزيو","ميناء الغزوات","ميناء تنس"], correct:0},
    {q:"ما هي الشركة الوطنية المسؤولة عن استخراج وتسويق المحروقات؟", opts:["سوناطراك","سونلغاز","صيدال"], correct:0},
    {q:"أين يوجد أكبر منجم للحديد في الجزائر (الغرب)؟", opts:["منجم غار جبيلات","منجم جبل العنق","منجم الونزة"], correct:0},
    {q:"ما هو المعدن الذي تشتهر بإنتاجه ولاية تبسة؟", opts:["الفوسفات","الذهب","النحاس"], correct:0},
    {q:"بماذا يتميز الغاز الطبيعي الجزائري عالمياً؟", opts:["بجودته العالية وسهولة نقله عبر الأنابيب","بارتفاع نسبة الكبريت فيه","بلونه الأخضر"], correct:0},
    {q:'ما هو "أنبوب الغاز" الذي يربط الجزائر بإسبانيا مباشرة؟', opts:["ميدغاز","ترانسميد","غالسي"], correct:0},

      card.style.backdropFilter = 'blur(8px)';

      card.innerHTML = `
        <div class="text-4xl w-16 h-16 rounded-xl flex items-center justify-center shrink-0" style="background:${unlocked ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.1)'}">
          ${unlocked ? g.icon : '🔒'}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <h3 class="font-bold text-white text-lg">${g.name}</h3>
            ${completed ? '<span class="text-yellow-300 text-sm">✓ مكتملة</span>' : ''}
          </div>
          <p class="text-white/60 text-sm mt-1">${g.desc}</p>
          ${completed ? `<p class="text-yellow-300 text-sm mt-1">النتيجة: ${state.groupScores[i]}/10</p>` : ''}
        </div>
      `;

      if (unlocked) {
        card.onclick = () => startGroup(i);
      }
      container.appendChild(card);
    });
    showScreen('groupsScreen');
    lucide.createIcons();
  }

  function startGroup(index) {
    state.currentGroup = index;
    state.currentQ = 0;
    state.score = 0;
    state.answered = false;
    document.getElementById('quizTotal').textContent = groups[index].questions.length;
    showScreen('quizScreen');
    renderQuestion();
  }

  function renderQuestion() {
    const group = groups[state.currentGroup];
    const q = group.questions[state.currentQ];
    const total = group.questions.length;

    document.getElementById('questionCounter').textContent = `السؤال ${state.currentQ + 1} من ${total}`;
    document.getElementById('progressBar').style.width = ((state.currentQ / total) * 100) + '%';
    document.getElementById('quizScore').textContent = state.score;
    document.getElementById('questionText').textContent = q.q;

    const container = document.getElementById('answersContainer');
    container.innerHTML = '';
    state.answered = false;
    document.getElementById('feedbackArea').classList.add('hidden');

    const labels = ['أ','ب','ج'];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-btn w-full text-right p-4 rounded-xl border-2 border-gray-200 hover:border-[#1a7a8a] transition flex items-center gap-3';
      btn.style.background = '#f8f9fa';
      btn.innerHTML = `<span class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 font-bold text-sm" style="background:#e8f4f8;color:#0d4f6b;">${labels[i]}</span><span style="color:#1a1a2e;">${opt}</span>`;
      btn.onclick = () => selectAnswer(i, btn);
      container.appendChild(btn);
    });

    // Animate card
    const card = document.getElementById('questionCard');
    card.classList.remove('fade-up');
    void card.offsetWidth;
    card.classList.add('fade-up');
  }

  function selectAnswer(index, btn) {
    if (state.answered) return;
    state.answered = true;

    const q = groups[state.currentGroup].questions[state.currentQ];
    const isCorrect = index === q.correct;
    const allBtns = document.getElementById('answersContainer').children;

    // Highlight correct
    for (let i = 0; i < allBtns.length; i++) {
      allBtns[i].disabled = true;
      if (i === q.correct) {
        allBtns[i].style.background = '#d4edda';
        allBtns[i].style.borderColor = '#28a745';
        allBtns[i].classList.add('correct-answer');
      }
    }

    if (isCorrect) {
      state.score++;
      btn.querySelector('span:first-child').textContent = '✓';
    } else {
      btn.style.background = '#f8d7da';
      btn.style.borderColor = '#dc3545';
      btn.classList.add('wrong-answer');
      btn.querySelector('span:first-child').textContent = '✗';
    }

    document.getElementById('quizScore').textContent = state.score;

    const isLast = state.currentQ >= groups[state.currentGroup].questions.length - 1;
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.textContent = isLast ? 'عرض النتائج 🏆' : 'السؤال التالي ←';
    document.getElementById('feedbackArea').classList.remove('hidden');
  }

  function nextQuestion() {
    const group = groups[state.currentGroup];
    if (state.currentQ < group.questions.length - 1) {
      state.currentQ++;
      renderQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    const total = groups[state.currentGroup].questions.length;
    const score = state.score;
    const pct = score / total;

    state.groupScores[state.currentGroup] = score;
    if (pct >= 0.5) {
      state.groupCompleted[state.currentGroup] = true;
    }
    state.totalScore = state.groupScores.reduce((a,b) => a+b, 0);
    saveState();

    document.getElementById('resultScore').textContent = `${score}/${total}`;

    let emoji, title;
    if (pct === 1) { emoji = '🏆'; title = 'ممتاز! نتيجة مثالية!'; }
    else if (pct >= 0.7) { emoji = '🎉'; title = 'أحسنت! أداء رائع!'; }
    else if (pct >= 0.5) { emoji = '👍'; title = 'جيد! يمكنك التحسن'; }
    else { emoji = '💪'; title = 'حاول مرة أخرى!'; }

    document.getElementById('resultsEmoji').textContent = emoji;
    document.getElementById('resultsTitle').textContent = title;

    const passed = pct >= 0.5;
    document.getElementById('resultsDesc').textContent = passed
      ? (state.currentGroup < 5 ? 'تم فتح المجموعة التالية! واصل التقدم 🚀' : 'أكملت جميع المجموعات! أنت جاهز للبكالوريا 🎓')
      : 'تحتاج 5 إجابات صحيحة على الأقل لفتح المجموعة التالية';

    // Stars
    const starsDiv = document.getElementById('starsContainer');
    starsDiv.innerHTML = '';
    const starCount = pct >= 0.9 ? 3 : pct >= 0.7 ? 2 : pct >= 0.5 ? 1 : 0;
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      s.className = 'star text-3xl inline-block';
      s.style.animationDelay = (i * 0.15) + 's';
      s.style.opacity = '0';
      s.textContent = i < starCount ? '⭐' : '☆';
      s.style.color = i < starCount ? '' : 'rgba(255,255,255,0.3)';
      starsDiv.appendChild(s);
    }

    if (pct >= 0.7) spawnConfetti();
    showScreen('resultsScreen');
    updateHomeStats();
  }

  function retryGroup() {
    startGroup(state.currentGroup);
  }

  function spawnConfetti() {
    const colors = ['#FFD700','#1a7a8a','#fff','#2bb5a0','#ff6b6b'];
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + '%';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      c.style.animationDuration = (1.5 + Math.random()) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }
  }

  // Element SDK
  const defaultConfig = {
    app_title: 'جغرافيا الجزائر - بكالوريا',
    background_color: '#0d4f6b',
    surface_color: '#FFD700',
    text_color: '#ffffff',
    primary_action_color: '#FFD700',
    secondary_action_color: '#1a7a8a',
    font_family: 'Noto Kufi Arabic',
    font_size: 16
  };

  function applyConfig(config) {
    const title = config.app_title || defaultConfig.app_title;
    document.getElementById('mainTitle').textContent = title;

    const bg = config.background_color || defaultConfig.background_color;
    const surface = config.surface_color || defaultConfig.surface_color;
    const text = config.text_color || defaultConfig.text_color;
    const primary = config.primary_action_color || defaultConfig.primary_action_color;
    const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
    const font = config.font_family || defaultConfig.font_family;
    const size = config.font_size || defaultConfig.font_size;

    document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, ${secondary} 50%, ${secondary}cc 100%)`;

    document.querySelectorAll('.quiz-btn').forEach(b => {
      if (b.style.background && !b.style.background.includes('transparent')) {
        // primary buttons
      }
    });

    document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el => {
      el.style.fontFamily = `${font}, sans-serif`;
    });

    document.body.style.fontSize = size + 'px';
  }

  if (window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color:v}); }},
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color:v}); }},
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title]
      ])
    });
  }

  // Init
  updateHomeStats();
  lucide.createIcons();
</script>
